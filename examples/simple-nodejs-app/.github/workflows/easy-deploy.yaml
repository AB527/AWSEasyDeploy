on:
  push:
    branches:
      - main


name: AWS Easy Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Zip application
        run: |
          zip -r app.zip . \
            -x ".git/*" \
            -x "app.zip"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload to S3
        run: |
          aws s3 cp app.zip s3://test33-ca7b8418/app-${{ github.sha }}.zip

      - name: Create EB application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name test33 \
            --version-label app-${{ github.run_number }}-${{ github.sha }} \
            --source-bundle S3Bucket=test33-ca7b8418,S3Key=app-${{ github.sha }}.zip

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name test33-env \
            --version-label app-${{ github.run_number }}-${{ github.sha }}